<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cavid Balayev — Portfolio</title>
<meta name="description" content="Selected architectural works by Cavid Balayev — cultural, residential and social-housing projects.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#f4f2ec">
<meta property="og:type" content="website">
<meta property="og:title" content="Cavid Balayev — Portfolio">
<meta property="og:description" content="Selected architectural works — cultural, residential and social-housing projects.">
<meta property="og:url" content="https://cavid017.github.io/portfolio.html">
<meta property="og:image" content="https://cavid017.github.io/assets/slides/page-08.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,400;0,500;1,300&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f2ec; --stage:#e7e5dd; --ink:#1b1a16; --taupe:#78756c; --deep:#3a382f;
    --line:rgba(27,26,22,.16);
    --serif:'Newsreader',Georgia,serif; --sans:'Space Grotesk','Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  @view-transition{navigation:auto}
  @media (prefers-reduced-motion:no-preference){body{animation:pgfade .45s ease both}}
  @keyframes pgfade{from{opacity:0}to{opacity:1}}
  html,body{height:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);overflow:hidden;-webkit-user-select:none;-ms-user-select:none;user-select:none}
  img{-webkit-user-drag:none;-webkit-user-select:none;user-select:none;pointer-events:none}
  a{color:inherit}
  button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
  .lnk{transition:opacity .25s}.lnk:hover{opacity:.55}

  /* ---------- header ---------- */
  header{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;justify-content:space-between;
    align-items:center;padding:14px clamp(20px,4vw,44px);background:var(--paper)}
  .hleft{display:flex;gap:clamp(16px,3vw,34px);align-items:center}
  .brand{font-family:var(--serif);font-size:18px;letter-spacing:.01em;font-weight:400}
  .home{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--taupe);text-decoration:none;display:flex;gap:8px;align-items:center}
  #langBtn{display:none}
  #langBtn:hover{background:var(--ink);color:var(--paper)}
  .hright{display:flex;align-items:center;gap:clamp(12px,1.8vw,20px)}
  .dlbtn{display:inline-flex;align-items:center;gap:8px;text-decoration:none;border:1px solid var(--ink);
    padding:7px 14px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;color:var(--ink);transition:all .2s}
  .dlbtn:hover{background:var(--ink);color:var(--paper)}

  /* ---------- footer caption ---------- */
  footer{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;justify-content:space-between;
    align-items:flex-end;gap:20px;padding:12px clamp(20px,4vw,44px) 15px;background:var(--paper)}
  .capnum{font-family:var(--serif);font-weight:300;font-size:clamp(24px,3.4vw,38px);line-height:.85}
  .captxt{display:flex;flex-direction:column;gap:5px;min-width:0}
  .captitle{font-family:var(--serif);font-weight:400;font-size:clamp(17px,2.4vw,24px);line-height:1.05}
  .capmeta{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--taupe);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .capline{display:flex;align-items:baseline;gap:clamp(14px,2vw,22px)}
  .count{font-size:12px;letter-spacing:.16em;color:var(--taupe);font-variant-numeric:tabular-nums;text-align:right}
  .prog{width:clamp(90px,16vw,190px);height:2px;background:rgba(27,26,22,.18);margin-top:10px;overflow:hidden}
  .prog b{display:block;height:100%;background:var(--ink);width:0;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .hint{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--taupe);margin-top:7px}

  /* ---------- slider ---------- */
  #app{height:100vh}
  .hwrap{height:100vh;position:relative;background:var(--paper);overflow:hidden}
  .track{display:flex;height:100%;will-change:transform;transition:transform .62s cubic-bezier(.5,.05,.15,1)}
  .track.drag{transition:none}
  .hslide{flex:0 0 100%;height:100%;display:flex;align-items:center;justify-content:center;
    padding:56px clamp(12px,3vw,50px) 74px}
  .hslide img{max-width:100%;max-height:100%;object-fit:contain;display:block;
    box-shadow:0 24px 70px rgba(27,26,22,.20);background:#fff}
  .nav{position:absolute;top:50%;transform:translateY(-50%);z-index:30;width:clamp(44px,6vw,62px);
    height:clamp(44px,6vw,62px);border:1px solid var(--ink);border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:24px;line-height:1;
    background:rgba(244,242,236,.7);backdrop-filter:blur(4px);transition:all .25s}
  .nav:hover{background:var(--ink);color:var(--paper)}
  .nav:focus-visible{outline:2px solid var(--ink);outline-offset:3px}
  .nav.prev{left:clamp(12px,2.5vw,30px)}.nav.next{right:clamp(12px,2.5vw,30px)}
  .nav[disabled]{opacity:.28;pointer-events:none}
  .hslide img{transition:transform .28s cubic-bezier(.2,.7,.2,1)}
  .hwrap.zoomed{cursor:grab}.hwrap.zoomed:active{cursor:grabbing}

  /* zoom (loupe) controls */
  .zoom{position:fixed;right:clamp(12px,2.5vw,30px);bottom:clamp(82px,14vh,120px);z-index:35;
    display:flex;flex-direction:column;gap:8px}
  .zbtn{width:40px;height:40px;border:1px solid var(--ink);border-radius:50%;color:var(--ink);
    background:rgba(244,242,236,.82);backdrop-filter:blur(4px);display:flex;align-items:center;
    justify-content:center;transition:all .2s}
  .zbtn:hover{background:var(--ink);color:var(--paper)}
  .zbtn:focus-visible{outline:2px solid var(--ink);outline-offset:3px}
  .zbtn svg{width:18px;height:18px}
  #zrst{opacity:.5}.hwrap.zoomed ~ .zoom #zrst,.zoomed #zrst{opacity:1}

  @media (prefers-reduced-motion:reduce){.track{transition:none}}
  @media (max-width:720px){
    .capnum{display:none}
    footer{padding-bottom:12px}
    .home span.long{display:none}
  }
</style>
</head>
<body>
  <header>
    <div class="hleft">
      <a class="home lnk" href="./">← <span class="long" data-i="home">Home</span></a>
      <div class="brand">Cavid Balayev</div>
    </div>
    <div class="hright">
      <a class="dlbtn" href="portfolio.pdf" download="Cavid Balayev Portfolio.pdf" data-i="dl">Download ↓</a>
      <button id="langBtn">TR</button>
    </div>
  </header>

  <div id="app"></div>

  <footer>
    <div class="capline">
      <div class="capnum" id="capNum">01</div>
      <div class="captxt">
        <div class="captitle" id="capTitle">Portfolio</div>
        <div class="capmeta" id="capMeta">Selected Works</div>
      </div>
    </div>
    <div style="text-align:right">
      <div class="count"><span id="cur">01</span> / 19</div>
      <div class="prog"><b id="progBar"></b></div>
      <div class="hint" id="hint" data-i="hint">← → keys · drag · swipe</div>
    </div>
  </footer>

  <div class="zoom" aria-label="Zoom controls">
    <button class="zbtn" id="zin" aria-label="Zoom in" title="Zoom in">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M15.5 15.5 21 21"/><path d="M10.5 7.8v5.4M7.8 10.5h5.4"/></svg>
    </button>
    <button class="zbtn" id="zout" aria-label="Zoom out" title="Zoom out">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M15.5 15.5 21 21"/><path d="M7.8 10.5h5.4"/></svg>
    </button>
    <button class="zbtn" id="zrst" aria-label="Reset zoom" title="Reset">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 12a8.5 8.5 0 1 0 3-6.5"/><path d="M3 4v4h4"/></svg>
    </button>
  </div>

<script>
/* ---------------- data ---------------- */
const PROJECTS=[
 {r:[3,6],  num:'01', title:'Acoustic Experience Museum', place:'Kadıköy · İstanbul', meta:'Academic · 2024'},
 {r:[7,10], num:'02', title:'Research Institute of Sinan the Architect', place:'Tophane · İstanbul', meta:'Academic · 2023'},
 {r:[11,14],num:'03', title:'Social Housing', place:'Bayrampaşa · İstanbul', meta:'Academic · 2022'},
 {r:[15,18],num:'04', title:'Cycling Club', place:'Beylerbeyi · İstanbul', meta:'Academic · 2019'},
];
function metaFor(n){
  if(n===1) return {num:'',title:'Portfolio',meta:'Selected Works'};
  if(n===2) return {num:'',title:'Contents',meta:'01 – 04'};
  for(const p of PROJECTS){ if(n>=p.r[0]&&n<=p.r[1]) return {num:p.num,title:p.title,meta:p.place+' — '+p.meta}; }
  if(n===19) return {num:'',title:'Cavid Balayev',meta:'Portfolio 2025'};
  return {num:'',title:'',meta:''};
}
const N=19;
const SLIDES=Array.from({length:N},(_,i)=>{const n=i+1;return {n,img:`assets/slides/page-${String(n).padStart(2,'0')}.jpg`,...metaFor(n)};});

/* ---------------- i18n ---------------- */
const T={en:{home:'Home',hint:'← → keys · drag · swipe',dl:'Download ↓'},
         tr:{home:'Ana Sayfa',hint:'← → tuşları · sürükle · kaydır',dl:'İndir ↓'}};
let lang=localStorage.getItem('lang')||'en';
function applyLang(){document.documentElement.lang=lang;
  document.querySelectorAll('[data-i]').forEach(el=>{const k=el.getAttribute('data-i');if(T[lang][k]!=null)el.textContent=T[lang][k];});
  document.getElementById('langBtn').textContent=lang==='en'?'TR':'EN';}

/* ---------------- caption ---------------- */
function setCaption(i){const s=SLIDES[i];
  document.getElementById('capNum').textContent=s.num||'—';
  document.getElementById('capTitle').textContent=s.title;
  document.getElementById('capMeta').textContent=s.meta;
  document.getElementById('cur').textContent=String(i+1).padStart(2,'0');
  document.getElementById('progBar').style.width=((i+1)/N*100)+'%';
}

/* ---------------- slider ---------------- */
const app=document.getElementById('app');
let idx=0, go=()=>{};

function build(){
  const wrap=document.createElement('div');wrap.className='hwrap';
  const track=document.createElement('div');track.className='track';
  SLIDES.forEach(s=>{const sl=document.createElement('div');sl.className='hslide';
    const im=document.createElement('img');im.src=s.img;im.alt=(s.title||'Portfolio')+' — page '+s.n;im.draggable=false;
    sl.appendChild(im);track.appendChild(sl);});
  const prev=document.createElement('button');prev.className='nav prev';prev.innerHTML='‹';prev.setAttribute('aria-label','Previous');
  const next=document.createElement('button');next.className='nav next';next.innerHTML='›';next.setAttribute('aria-label','Next');
  wrap.append(prev,next,track);app.appendChild(wrap);

  // zoom state — applies to the CURRENT slide only
  let scale=1,zx=0,zy=0,curImg=null;
  function applyZoom(anim){if(!curImg)return;curImg.style.transition=anim?'':'none';
    curImg.style.transform=scale===1?'':`translate(${zx}px,${zy}px) scale(${scale})`;
    wrap.classList.toggle('zoomed',scale>1);}

  go=function(i){if(curImg){curImg.style.transition='';curImg.style.transform='';}
    idx=Math.max(0,Math.min(N-1,i));scale=1;zx=0;zy=0;
    track.style.transform=`translateX(${-idx*100}%)`;
    prev.disabled=idx===0;next.disabled=idx===N-1;
    curImg=track.children[idx].querySelector('img');
    wrap.classList.remove('zoomed');setCaption(idx);};

  prev.addEventListener('click',()=>go(idx-1));
  next.addEventListener('click',()=>go(idx+1));

  // zoom (loupe) buttons — only affect the current slide
  document.getElementById('zin').addEventListener('click',()=>{scale=Math.min(4,+(scale*1.4).toFixed(3));applyZoom(true);});
  document.getElementById('zout').addEventListener('click',()=>{scale=Math.max(1,+(scale/1.4).toFixed(3));if(scale===1){zx=0;zy=0;}applyZoom(true);});
  document.getElementById('zrst').addEventListener('click',()=>{scale=1;zx=0;zy=0;applyZoom(true);});
  wrap.addEventListener('dblclick',e=>{if(e.target.closest('.nav')||e.target.closest('.zoom'))return;
    if(scale===1)scale=2;else{scale=1;zx=0;zy=0;}applyZoom(true);});

  // wheel: navigate slides when not zoomed (horizontal intent)
  let wlock=false;
  wrap.addEventListener('wheel',e=>{if(scale>1)return;
    if(Math.abs(e.deltaX)>Math.abs(e.deltaY)||e.shiftKey){e.preventDefault();
      if(wlock)return;wlock=true;setTimeout(()=>wlock=false,520);go(idx+((e.deltaX||e.deltaY)>0?1:-1));}
  },{passive:false});

  // pointer: pan when zoomed, else swipe between slides (never blocks arrow clicks)
  let downX=null,downY=null,moved=false,w=1,szx=0,szy=0,panning=false,lastDx=0;
  wrap.addEventListener('pointerdown',e=>{if(e.target.closest('.nav')||e.target.closest('.zoom'))return;
    downX=e.clientX;downY=e.clientY;w=wrap.clientWidth||1;moved=false;lastDx=0;
    if(scale>1){panning=true;szx=zx;szy=zy;}else{panning=false;track.classList.add('drag');}});
  wrap.addEventListener('pointermove',e=>{if(downX===null)return;const dx=e.clientX-downX,dy=e.clientY-downY;lastDx=dx;
    if(Math.abs(dx)>6||Math.abs(dy)>6)moved=true;
    if(panning){zx=szx+dx;zy=szy+dy;applyZoom(false);}
    else{track.style.transform=`translateX(calc(${-idx*100}% + ${dx}px))`;}});
  function pend(){if(downX===null)return;downX=null;
    if(panning){panning=false;return;}
    track.classList.remove('drag');
    if(moved&&Math.abs(lastDx)>w*0.10)go(idx+(lastDx<0?1:-1));else go(idx);}
  wrap.addEventListener('pointerup',pend);wrap.addEventListener('pointerleave',pend);wrap.addEventListener('pointercancel',pend);

  go(0);
}

/* keyboard: ← → (and Home/End) — global, always active */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'){e.preventDefault();go(idx+1);}
  else if(e.key==='ArrowLeft'){e.preventDefault();go(idx-1);}
  else if(e.key==='Home'){e.preventDefault();go(0);}
  else if(e.key==='End'){e.preventDefault();go(N-1);}
});

document.getElementById('langBtn').onclick=()=>{lang=lang==='en'?'tr':'en';localStorage.setItem('lang',lang);applyLang();};
build();
applyLang();
/* deter copying / saving of the artwork */
['contextmenu','dragstart','copy','cut','selectstart'].forEach(ev=>document.addEventListener(ev,e=>e.preventDefault()));
</script>
</body>
</html>
