<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cavid Balayev — Architecture Portfolio</title>
<style>
  :root{
    --bg:#FBFBF9; --ink:#16181B; --muted:#6A7078; --hair:#E2E3DF; --sq:#E7E7E3;
    --geo:"Futura","Century Gothic","Avenir Next","Nunito Sans","Segoe UI",system-ui,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#111316; --ink:#F1F1EE; --muted:#9BA1A8; --hair:#2A2D31; --sq:#1B1E22; }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      linear-gradient(var(--sq) 1px,transparent 1px) 0 0/64px 64px,
      linear-gradient(90deg,var(--sq) 1px,transparent 1px) 0 0/64px 64px,
      var(--bg);
    color:var(--ink); font-family:var(--geo);
    min-height:100%; display:flex; align-items:center; justify-content:center;
    padding:40px 22px; -webkit-font-smoothing:antialiased;
  }
  .card{ max-width:560px; width:100%; text-align:center; }
  .eyebrow{ font-size:12px; letter-spacing:.42em; text-transform:uppercase; color:var(--muted); margin-bottom:26px; }
  h1{ font-size:clamp(34px,8vw,58px); font-weight:600; letter-spacing:.16em; line-height:1.1; text-transform:lowercase; }
  .sub{ margin-top:16px; font-size:13px; letter-spacing:.34em; text-transform:uppercase; color:var(--ink); }
  .rule{ width:44px; height:2px; background:var(--ink); margin:30px auto; }
  .lead{ font-size:14px; line-height:1.7; color:var(--muted); max-width:42ch; margin:0 auto; }
  .cta{
    display:inline-flex; align-items:center; gap:10px; margin-top:34px;
    font-size:13px; letter-spacing:.14em; text-transform:uppercase; font-weight:600;
    color:var(--bg); background:var(--ink); text-decoration:none;
    padding:15px 30px; border-radius:2px; transition:opacity .2s;
  }
  .cta:hover{ opacity:.85 }
  .cta svg{ width:15px; height:15px }
  .links{ margin-top:34px; display:flex; flex-wrap:wrap; gap:8px 22px; justify-content:center;
    font-size:12px; letter-spacing:.05em; }
  .links a{ color:var(--muted); text-decoration:none; border-bottom:1px solid transparent; padding-bottom:2px; }
  .links a:hover{ color:var(--ink); border-color:var(--ink) }
  .year{ margin-top:46px; font-size:11px; letter-spacing:.4em; color:var(--muted) }
</style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Architecture Portfolio</div>
    <h1>cavid<br>balayev</h1>
    <div class="sub">Architect</div>
    <div class="rule"></div>
    <p class="lead">Selected academic and professional works — cultural, residential and social-housing projects across Istanbul and Baku, with a focus on computational and parametric design.</p>

    <a class="cta" href="portfolio.pdf" target="_blank" rel="noopener">
      View Portfolio
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>

    <nav class="links">
      <a href="https://www.linkedin.com/in/cavid-bv000" target="_blank" rel="noopener">LinkedIn</a>
      <a href="mailto:cavid.b.017@gmail.com">cavid.b.017@gmail.com</a>
      <a href="portfolio.pdf" download>Download PDF</a>
    </nav>

    <div class="year">2025</div>
  </main>
</body>
</html>
